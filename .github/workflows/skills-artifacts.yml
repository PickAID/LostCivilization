name: Package Skills

on:
    push:
        paths:
            - "skills/**"
            - "docs/.vitepress/scripts/package_skills.py"
            - ".github/workflows/skills-artifacts.yml"
            - ".gitignore"
            - "skills/version.json"
    pull_request:
        paths:
            - "skills/**"
            - "docs/.vitepress/scripts/package_skills.py"
            - ".github/workflows/skills-artifacts.yml"
            - ".gitignore"
            - "skills/version.json"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    discover:
        runs-on: ubuntu-latest
        outputs:
            skills: ${{ steps.discover.outputs.skills }}
            version: ${{ steps.version.outputs.version }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.19.0"

            - name: Get version
              id: version
              run: |
                  VERSION=$(node -p "require('./skills/version.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Current skills version: $VERSION"

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"

            - name: Discover skills
              id: discover
              run: |
                  SKILLS_JSON=$(python3 docs/.vitepress/scripts/package_skills.py --skills-root skills --list-only --json)
                  echo "skills=$SKILLS_JSON" >> "$GITHUB_OUTPUT"
                  echo "Discovered skills: $SKILLS_JSON"

    package:
        needs: discover
        if: ${{ needs.discover.outputs.skills != '[]' }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                skill: ${{ fromJson(needs.discover.outputs.skills) }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"

            - name: Package skill
              run: |
                  python3 docs/.vitepress/scripts/package_skills.py \
                    --skills-root skills \
                    --output-dir skills/artifacts \
                    --skill "${{ matrix.skill }}"

            - name: Upload skill artifact to action
              uses: actions/upload-artifact@v4
              with:
                  name: skill-${{ matrix.skill }}
                  path: skills/artifacts/${{ matrix.skill }}.zip
                  if-no-files-found: error
                  retention-days: 1

    release:
        needs: [discover, package]
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Check if tag exists
              id: check_tag
              run: |
                  TAG="v${{ needs.discover.outputs.version }}"
                  if git rev-parse "$TAG" >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "Tag $TAG already exists, skipping release upload."
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                    echo "Tag $TAG does not exist, proceeding with release."
                  fi

            - name: Download all packaged skills
              if: steps.check_tag.outputs.exists == 'false'
              uses: actions/download-artifact@v4
              with:
                  path: skills-artifacts
                  pattern: skill-*
                  merge-multiple: true

            - name: Create or Update Release
              if: steps.check_tag.outputs.exists == 'false'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ needs.discover.outputs.version }}
                  files: skills-artifacts/*.zip
                  generate_release_notes: true
                  token: ${{ secrets.GITHUB_TOKEN }}
